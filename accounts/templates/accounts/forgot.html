{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.forgot-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    background: #f5f7fb;
}

.forgot-box {
    display: flex;
    width: 800px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* LEFT IMAGE */
.forgot-left {
    width: 50%;
    background: url("{% static 'images/forgot.jpg' %}") no-repeat center;
    background-size: cover;
}

/* RIGHT FORM */
.forgot-right {
    width: 50%;
    padding: 40px;
}

.forgot-right h2 {
    color: #0b2c5a;
    margin-bottom: 10px;
}

.forgot-right p {
    color: #666;
    margin-bottom: 20px;
    font-size: 14px;
}

.forgot-right input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

.forgot-right input:focus {
    border-color: #f4b400;
    outline: none;
}

.btn-forgot {
    width: 100%;
    padding: 12px;
    background: #0b2c5a;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-forgot:hover {
    background: #f4b400;
    color: black;
}

.msg {
    color: green;
    margin-bottom: 10px;
}

.error {
    color: red;
    margin-bottom: 10px;
}

.extra {
    margin-top: 15px;
    text-align: center;
}

.extra a {
    text-decoration: none;
    color: #0b2c5a;
}

.extra a:hover {
    color: #f4b400;
}

/* MOBILE */
@media(max-width:768px){
    .forgot-box {
        flex-direction: column;
        width: 90%;
    }

    .forgot-left {
        height: 200px;
        width: 100%;
    }

    .forgot-right {
        width: 100%;
    }
}
</style>

<div class="forgot-container">
    <div class="forgot-box">

        <!-- LEFT IMAGE -->
        <div class="forgot-left"></div>

        <!-- RIGHT FORM -->
        <div class="forgot-right">
            <h2>Forgot Password</h2>
            <p>Enter your email and we will send you a temporary password.</p>

            {% if msg %}
                <div class="msg">{{ msg }}</div>
            {% endif %}

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <input type="email" name="email" placeholder="Enter your email" required>

                <button type="submit" class="btn-forgot">Send Password</button>
            </form>

            <div class="extra">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
