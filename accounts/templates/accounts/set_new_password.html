{% extends 'base.html' %}
{% block content %}

<style>
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background: #f5f7fb;
    }

    .box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #0b2c5a;
    }

    .box input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .box button {
        width: 100%;
        padding: 12px;
        background: #0b2c5a;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .box button:hover {
        background: #f4b400;
        color: black;
    }

    .msg {
        text-align: center;
        margin-bottom: 10px;
        color: red;
    }
</style>

<div class="container">
    <div class="box">
        <h2>Set New Password</h2>

        {% if error %}
            <div class="msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="password" name="password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Update Password</button>
        </form>
    </div>
</div>

{% endblock %}
