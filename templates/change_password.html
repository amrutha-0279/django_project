{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    body {
        background: #f6f9ff;
    }

    .password-container {
        max-width: 420px;
        margin: 60px auto;
    }

    .password-card {
        background: #fff;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .password-card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #0b2c5a;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #1e90ff;
        outline: none;
        box-shadow: 0 0 5px rgba(30,144,255,0.3);
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #0b2c5a, #1e90ff);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        opacity: 0.9;
    }

    .error-msg {
        color: red;
        text-align: center;
        margin-top: 10px;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        color: #1e90ff;
    }
</style>

<div class="password-container">
    <div class="password-card">

        <h2>🔐 Change Password</h2>

        <form method="POST">
            {% csrf_token %}

            
            <form method="POST">
    {% csrf_token %}

    <!-- Old password (no eye icon) -->
    <input type="password" name="old_password"
           placeholder="Current Password" required class="form-control">

    
    <div style="position: relative; margin-top:15px;">
        <input type="password" id="new_password" name="new_password"
               placeholder="New Password" required class="form-control">

        <span onclick="togglePassword()" 
              style="position:absolute; right:10px; top:12px; cursor:pointer;"></span>
    </div>

    <button type="submit" class="btn-submit" style="margin-top:15px;">
        Change Password
    </button>
</form>
        </form>

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>

    </div>
</div>

{% endblock %}
